{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | PLASU Health Access System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: url("{% static 'images/clinic_bg.jpg' %}") center center / cover no-repeat;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(15,40,28,0.94) 0%,
        rgba(26,82,57,0.88) 50%,
        rgba(12,30,20,0.97) 100%);
    }
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 52px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 16px 56px rgba(0,0,0,0.4);
    }
    .code {
      font-size: 5rem;
      font-weight: 900;
      color: #FFC53A;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -2px;
    }
    .label {
      font-size: 1rem;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .desc {
      font-size: 0.84rem;
      color: rgba(255,255,255,0.45);
      margin-bottom: 32px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #FFC53A, #e0a800);
      color: #1a3a2a;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 28px;
      border-radius: 50px;
      transition: all 0.25s;
      box-shadow: 0 4px 18px rgba(255,197,58,0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255,197,58,0.55);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <div class="label">Page Not Found</div>
    <p class="desc">The page you are looking for does not exist.</p>
    <a href="/" class="btn">
      <i class="fas fa-home"></i> Go Home
    </a>
  </div>
</body>
</html>
